<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EmbeddedGUI HelloCustomWidgets</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="lang-toggle" role="group" aria-label="Language switch">
        <button type="button" class="lang-toggle-button" data-lang-switch="zh-CN">中文</button>
        <button type="button" class="lang-toggle-button" data-lang-switch="en">EN</button>
    </div>

    <div class="app-shell">
        <aside class="sidebar surface">
            <div class="sidebar-head">
                <div class="eyebrow">Fluent 2 / WPF UI</div>
                <h1 id="sidebar-title"></h1>
                <p id="sidebar-description"></p>
                <div class="hero-links">
                    <a id="link-home" class="button-link ghost" href="index.html"></a>
                    <a id="link-json" class="button-link ghost" href="demos/demos.json" target="_blank" rel="noreferrer"></a>
                </div>
            </div>
            <div class="sidebar-toolbar">
                <div class="toolbar-label" id="track-label"></div>
                <div class="pill-group" id="track-switches">
                    <button type="button" class="pill-button" data-track="reference"></button>
                    <button type="button" class="pill-button" data-track="showcase"></button>
                    <button type="button" class="pill-button" data-track="all"></button>
                </div>
                <input id="search-input" class="search-input" type="search">
                <div class="stats-row" id="sidebar-stats"></div>
            </div>
            <div id="sidebar-list" class="sidebar-list"></div>
        </aside>

        <main class="main-panel">
            <section class="hero surface">
                <div class="hero-top">
                    <div class="hero-copy">
                        <div class="eyebrow" id="hero-eyebrow"></div>
                        <h2 id="content-title"></h2>
                        <p id="content-description"></p>
                    </div>
                    <div class="action-row" id="action-row"></div>
                </div>
                <div class="meta-grid" id="meta-grid"></div>
                <div class="notice-stack" id="notice-stack"></div>
            </section>

            <section class="content-grid">
                <div id="empty-state" class="surface empty-state">
                    <h3 id="empty-title"></h3>
                    <p id="empty-description"></p>
                </div>
                <section id="preview-panel" class="surface panel hidden">
                    <div class="panel-head">
                        <span id="preview-label"></span>
                        <span id="preview-size"></span>
                    </div>
                    <div class="frame-wrap">
                        <iframe id="demo-frame" class="demo-frame" title="HelloCustomWidgets demo"></iframe>
                    </div>
                </section>
                <section id="doc-shell" class="surface panel hidden">
                    <div class="panel-head">
                        <span id="doc-label"></span>
                        <span id="doc-status"></span>
                    </div>
                    <div id="doc-panel" class="doc-panel"></div>
                </section>
            </section>
        </main>
    </div>

    <script src="lib/marked.min.js"></script>
    <script src="i18n.js"></script>
    <script src="doc-render.js"></script>
    <script src="custom-page.js"></script>
</body>
</html>
