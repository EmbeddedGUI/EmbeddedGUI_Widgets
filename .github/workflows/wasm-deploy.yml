name: Build WASM & Deploy to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.51

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable
          install-dependencies: true

      - name: Print browser version
        run: |
          "${{ steps.setup-chrome.outputs.chrome-path }}" --version

      - name: Build all WASM demos
        run: python scripts/web/wasm_build_demos.py

      - name: Headless web smoke check
        run: |
          python scripts/web/web_smoke_check.py \
            --browser "${{ steps.setup-chrome.outputs.chrome-path }}" \
            --output-dir output/ci_web_smoke

      - name: Upload web smoke artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-web-smoke
          path: output/ci_web_smoke
          if-no-files-found: ignore

      - name: Append web smoke summary
        if: always()
        run: |
          if [ -f output/ci_web_smoke/summary.md ]; then
            cat output/ci_web_smoke/summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Web Smoke Check" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "- \`output/ci_web_smoke/summary.md\` not found." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
