name: Custom Widgets Check

on:
  push:
    paths:
      - '.github/workflows/custom-widgets-check.yml'
      - '.gitmodules'
      - 'Makefile'
      - 'CLAUDE.md'
      - 'example/HelloCustomWidgets/**'
      - 'example/HelloUnitTest/**'
      - 'scripts/checks/check_widget_catalog.py'
      - 'scripts/checks/check_touch_release_semantics.py'
      - 'scripts/code_compile_check.py'
      - 'scripts/code_runtime_check.py'
      - 'scripts/widget_catalog.py'
      - 'requirements.txt'

  schedule:
    - cron: '0 2 * * 1'

  workflow_dispatch:
    inputs:
      category:
        description: 'Widget category to check'
        required: true
        default: all
        type: choice
        options:
          - all
          - input
          - display
          - layout
          - chart
          - navigation
          - feedback
          - media
          - decoration

jobs:
  resolve-categories:
    runs-on: ubuntu-latest
    outputs:
      categories: ${{ steps.resolve.outputs.categories }}
    steps:
      - id: resolve
        shell: bash
        env:
          DISPATCH_CATEGORY: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.category || 'all' }}
        run: |
          if [ "$DISPATCH_CATEGORY" = "all" ]; then
            echo 'categories=["input","display","layout","chart","navigation","feedback","media","decoration"]' >> "$GITHUB_OUTPUT"
          else
            echo "categories=[\"$DISPATCH_CATEGORY\"]" >> "$GITHUB_OUTPUT"
          fi

  unit-test:
    needs: catalog
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: rlalik/setup-cpp-compiler@v1.2

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Run HelloUnitTest
        run: python scripts/code_compile_check.py --unit-tests-only --bits64

  check:
    needs: [resolve-categories, catalog]
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        category: ${{ fromJson(needs.resolve-categories.outputs.categories) }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: rlalik/setup-cpp-compiler@v1.2

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Audit custom widget touch release semantics (${{ matrix.category }})
        run: python scripts/checks/check_touch_release_semantics.py --scope custom --category ${{ matrix.category }}

      - name: Check custom widgets (${{ matrix.category }})
        run: python scripts/code_compile_check.py --custom-widgets --category ${{ matrix.category }} --bits64

      - name: Runtime check custom widgets (${{ matrix.category }})
        run: python scripts/code_runtime_check.py --app HelloCustomWidgets --category ${{ matrix.category }} --bits64

  catalog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Check widget catalog consistency
        run: python scripts/checks/check_widget_catalog.py
